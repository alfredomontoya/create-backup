<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Backup Generator</title>

  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <!-- USUARIOS PARA BACKUP -->
    <div>
      <h3>Usuarios</h3>
      <div id="lista" class="card"></div>
    </div>

    <div style="display: none;">
      <h3>Carpetas a copiar</h3>
      <div id="carpetas" class="card">
        <label><input type="checkbox" value="Desktop" checked> Desktop</label>
        <label><input type="checkbox" value="Downloads" checked> Downloads</label>
        <label><input type="checkbox" value="Documents" checked> Documents</label>
        <label><input type="checkbox" value="Music" checked> Music</label>
        <label><input type="checkbox" value="Videos" checked> Videos</label>
        <label><input type="checkbox" value="Pictures" checked> Videos</label>
      </div>
      <div id="errorCarpetas" class="error">⚠️ Selecciona al menos una carpeta</div>
    </div>

    <div>
        <h3>Discos completos</h3>
        <div id="discosBackup" class="card"></div>
      </div>

      <div>
        <h3>Disco destino</h3>
        <div id="discos" class="card"></div>
        <div id="errorDisco" class="error">⚠️ Debes seleccionar un disco</div>
      </div>

    <div>
      <h3>Configuración</h3>
      <div class="card">
        <label>Nombre del respaldo</label>
        <div id="carpetasExistentesContainer">dfdf</div>
        <input type="text" id="nombreDestino" placeholder="Ej: Backup_2026" value="BACKUP-2026\PC-01">
        <div id="errorNombre" class="error">⚠️ Debes escribir un nombre</div>
      </div>
    </div>

  </div>

  <div class="actions">
    <button id="btnGenerar">Generar</button>
    <button id="btnCopiar">Copiar</button>
    <button id="btnEjecutar">Ejecutar</button>
    <button id="btnLimpiar">Limpiar</button>
  </div>

  <textarea id="comandos" placeholder="Aquí se verá el proceso..."></textarea>

<!-- Reemplaza esta sección en tu HTML -->
<div class="progress-container">
  <h3>📊 Progreso del Backup</h3>
  <div id="progressText">0%</div>
  <div class="progress-bar">
    <div id="progressBar"></div>
  </div>
</div>

  <h3>Log</h3>
  <textarea id="logOutput" placeholder="Aquí se verá el log..."></textarea>

  <script src="renderer.js"></script>

</body>
</html>
